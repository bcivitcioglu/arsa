<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Villa — Shape Adaptation Test</title>
<style>
  body{margin:0;overflow:hidden;background:#1a1a2e;font-family:sans-serif}
  canvas{display:block}
  #info{position:absolute;top:10px;left:10px;color:#fff;background:rgba(0,0,0,0.6);padding:10px 16px;border-radius:8px;font-size:13px;line-height:1.5}
</style>
</head>
<body>
<div id="info">
  Modern Villa — Shape Adaptation Test<br>
  Left: Rectangle (12×8) &nbsp;|&nbsp; Center: Square (9×9) &nbsp;|&nbsp; Right: Pentagon (Villa C, 68m²)<br>
  Drag to orbit, scroll to zoom
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
THREE.OrbitControls=function(cam,el){
  var self=this;self.enabled=true;
  self.camera=cam;self.domElement=el;self.target=new THREE.Vector3();
  self.enableDamping=false;self.dampingFactor=0.05;self.maxPolarAngle=Math.PI;
  self.minDistance=1;self.maxDistance=500;
  var sph=new THREE.Spherical(),sphD=new THREE.Spherical();
  var sc=1,panOff=new THREE.Vector3();
  var rS=new THREE.Vector2(),rE=new THREE.Vector2(),rD=new THREE.Vector2();
  var pS=new THREE.Vector2(),pE=new THREE.Vector2(),pD=new THREE.Vector2();
  var st=0;var off=new THREE.Vector3();
  var q=new THREE.Quaternion().setFromUnitVectors(cam.up,new THREE.Vector3(0,1,0));
  var qI=q.clone().invert();
  self.update=function(){
    if(!self.enabled)return;
    off.copy(cam.position).sub(self.target).applyQuaternion(q);
    sph.setFromVector3(off);sph.theta+=sphD.theta;sph.phi+=sphD.phi;
    sph.phi=Math.max(0.01,Math.min(self.maxPolarAngle,sph.phi));
    sph.radius*=sc;sph.radius=Math.max(self.minDistance,Math.min(self.maxDistance,sph.radius));
    self.target.add(panOff);off.setFromSpherical(sph).applyQuaternion(qI);
    cam.position.copy(self.target).add(off);cam.lookAt(self.target);
    if(self.enableDamping){sphD.theta*=(1-self.dampingFactor);sphD.phi*=(1-self.dampingFactor);panOff.multiplyScalar(1-self.dampingFactor)}
    else{sphD.set(0,0,0);panOff.set(0,0,0)}
    sc=1;
  };
  function doPan(dx,dy){
    var v=new THREE.Vector3();var d=new THREE.Vector3().copy(cam.position).sub(self.target).length();
    var tD=d*Math.tan(cam.fov/2*Math.PI/180)*2;
    v.setFromMatrixColumn(cam.matrix,0);v.multiplyScalar(-dx/el.clientHeight*tD);panOff.add(v);
    v.setFromMatrixColumn(cam.matrix,1);v.multiplyScalar(dy/el.clientHeight*tD);panOff.add(v);
  }
  el.addEventListener('pointerdown',function(e){if(!self.enabled)return;if(e.button===0){st=1;rS.set(e.clientX,e.clientY)}else if(e.button===2){st=2;pS.set(e.clientX,e.clientY)}el.setPointerCapture(e.pointerId)});
  el.addEventListener('pointermove',function(e){if(!self.enabled)return;if(st===1){rE.set(e.clientX,e.clientY);rD.subVectors(rE,rS);sphD.theta-=2*Math.PI*rD.x/el.clientHeight;sphD.phi-=2*Math.PI*rD.y/el.clientHeight;rS.copy(rE)}else if(st===2){pE.set(e.clientX,e.clientY);pD.subVectors(pE,pS);doPan(pD.x,pD.y);pS.copy(pE)}});
  el.addEventListener('pointerup',function(e){st=0;el.releasePointerCapture(e.pointerId)});
  el.addEventListener('wheel',function(e){if(!self.enabled)return;e.preventDefault();sc*=e.deltaY>0?1.05:0.95},{passive:false});
  el.addEventListener('contextmenu',function(e){e.preventDefault()});
};
</script>
<script>
// --- Scene setup ---
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.Fog(0x87CEEB,120,300);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,500);
camera.position.set(0,35,55);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.target.set(0,4,0);
controls.enableDamping=true;
controls.dampingFactor=0.08;

// --- Lighting ---
scene.add(new THREE.AmbientLight(0x404050,0.5));
scene.add(new THREE.HemisphereLight(0x87CEEB,0x8BC34A,0.4));
const sun=new THREE.DirectionalLight(0xFFF5E0,1.4);
sun.position.set(20,30,-15);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-40;sun.shadow.camera.right=40;
sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;
sun.shadow.camera.near=0.5;sun.shadow.camera.far=100;
sun.shadow.bias=-0.001;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0xB0C4DE,0.3).translateX(-15).translateY(10).translateZ(20));

// --- Ground ---
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0xD0CCC4,roughness:0.95})
);
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;
scene.add(ground);

// =============================================
// UNIVERSAL MODERN VILLA BUILDER
// =============================================
function polyCentroid(p){let x=0,y=0;for(const q of p){x+=q[0];y+=q[1]}return[x/p.length,y/p.length]}
function polyArea(p){let a=0;for(let i=0;i<p.length;i++){const j=(i+1)%p.length;a+=p[i][0]*p[j][1]-p[j][0]*p[i][1]}return Math.abs(a)/2}

function buildModernVilla(poly2D,height,color){
  const g=new THREE.Group();
  const n=poly2D.length;
  const cent=polyCentroid(poly2D);

  // --- Materials ---
  const matConcrete=new THREE.MeshStandardMaterial({color:0xEAE2DA,roughness:0.85,metalness:0.02});
  const matConcreteSlab=new THREE.MeshStandardMaterial({color:0xD8D0C8,roughness:0.8,metalness:0.03});
  const matWood=new THREE.MeshStandardMaterial({color:0xB07840,roughness:0.65});
  const matWoodDark=new THREE.MeshStandardMaterial({color:0x8B5A2B,roughness:0.6});
  const matGlass=new THREE.MeshPhysicalMaterial({color:0x88BBDD,transparent:true,opacity:0.3,roughness:0.05,metalness:0.1,side:THREE.DoubleSide});
  const matGlassLit=new THREE.MeshPhysicalMaterial({color:0xFFF8E8,transparent:true,opacity:0.45,roughness:0.05,emissive:0xFFE0A0,emissiveIntensity:0.25,side:THREE.DoubleSide});
  const matRailing=new THREE.MeshStandardMaterial({color:0x222222,roughness:0.25,metalness:0.85});
  const matFrame=new THREE.MeshStandardMaterial({color:0x1A1A1A,roughness:0.3,metalness:0.75});
  const matDoor=new THREE.MeshStandardMaterial({color:0x6B4226,roughness:0.55});

  // --- Find oriented bounding box aligned to longest edge ---
  let longestLen=0,longestIdx=0;
  for(let i=0;i<n;i++){
    const a=poly2D[i],b=poly2D[(i+1)%n];
    const l=Math.hypot(b[0]-a[0],b[1]-a[1]);
    if(l>longestLen){longestLen=l;longestIdx=i}
  }
  const eA=poly2D[longestIdx],eB=poly2D[(longestIdx+1)%n];
  const edx=eB[0]-eA[0],edy=eB[1]-eA[1],eLen=Math.hypot(edx,edy);
  const dirX=edx/eLen,dirY=edy/eLen;
  const perpX=-dirY,perpY=dirX;

  // Project all points onto local axes
  let minU=Infinity,maxU=-Infinity,minV=Infinity,maxV=-Infinity;
  for(let i=0;i<n;i++){
    const dx=poly2D[i][0]-cent[0],dy=poly2D[i][1]-cent[1];
    const u=dx*dirX+dy*dirY, v=dx*perpX+dy*perpY;
    minU=Math.min(minU,u);maxU=Math.max(maxU,u);
    minV=Math.min(minV,v);maxV=Math.max(maxV,v);
  }
  const W=maxU-minU, D=maxV-minV;
  const cU=(minU+maxU)/2, cV=(minV+maxV)/2;
  const cx=cent[0]+cU*dirX+cV*perpX;
  const cy=cent[1]+cU*dirY+cV*perpY;
  const rotY=-Math.atan2(dirY,dirX);

  // --- Helper: place box in local oriented coords ---
  function addBox(w,h,d,ox,oy,oz,mat,castS,recvS){
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    const wx=cx+ox*dirX+oz*perpX;
    const wz=cy+ox*dirY+oz*perpY;
    mesh.position.set(wx,oy,-wz);
    mesh.rotation.y=rotY;
    if(castS!==false)mesh.castShadow=true;
    if(recvS!==false)mesh.receiveShadow=true;
    g.add(mesh);
    return mesh;
  }

  // === Check if shape is rectangular ===
  var isRect=false;
  if(n===4){
    isRect=true;
    for(var ci=0;ci<4;ci++){
      var ca=poly2D[ci],cb=poly2D[(ci+1)%4],cc=poly2D[(ci+2)%4];
      var d1x=cb[0]-ca[0],d1y=cb[1]-ca[1],d2x=cc[0]-cb[0],d2y=cc[1]-cb[1];
      var dot2=d1x*d2x+d1y*d2y;
      var cosA=Math.abs(dot2)/(Math.hypot(d1x,d1y)*Math.hypot(d2x,d2y)+1e-9);
      if(cosA>0.15){isRect=false;break}
    }
  }

  // --- Dimensions ---
  const F1=height*0.5;
  const F2=height-F1;
  const SLAB=0.22;
  const railH=1.05,railTh=0.035;
  const f2base=F1+SLAB;
  const roofY=f2base+F2+SLAB;
  const glassInset=0.08;

  // === Helper: extrude polygon at given Y base with given height ===
  function extrudePoly(yBase,h,mat){
    var sh=new THREE.Shape();
    sh.moveTo(poly2D[0][0],poly2D[0][1]);
    for(var i=1;i<n;i++)sh.lineTo(poly2D[i][0],poly2D[i][1]);
    sh.closePath();
    var geo=new THREE.ExtrudeGeometry(sh,{depth:h,bevelEnabled:false});
    geo.rotateX(-Math.PI/2);
    geo.translate(0,yBase,0);
    var m=new THREE.Mesh(geo,mat);
    m.castShadow=true;m.receiveShadow=true;
    g.add(m);
  }

  // === Helper: flat polygon slab at given Y ===
  function polySlab(yPos,h,mat){
    var sh=new THREE.Shape();
    sh.moveTo(poly2D[0][0],poly2D[0][1]);
    for(var i=1;i<n;i++)sh.lineTo(poly2D[i][0],poly2D[i][1]);
    sh.closePath();
    var geo=new THREE.ExtrudeGeometry(sh,{depth:h,bevelEnabled:false});
    geo.rotateX(-Math.PI/2);
    geo.translate(0,yPos,0);
    var m=new THREE.Mesh(geo,mat);
    m.receiveShadow=true;
    g.add(m);
  }

  // === Helper: place element on a polygon edge ===
  // t = position along edge (0..1), offset = outward offset, yPos = center Y
  function edgeInfo(edgeIdx){
    var ea=poly2D[edgeIdx],eb=poly2D[(edgeIdx+1)%n];
    var dx=eb[0]-ea[0],dy=eb[1]-ea[1],len=Math.hypot(dx,dy);
    var ux=dx/len,uy=dy/len; // along edge
    var nx=-uy,ny=ux; // outward normal (assumes CCW winding)
    var angle=Math.atan2(dy,dx);
    return{ax:ea[0],ay:ea[1],ux:ux,uy:uy,nx:nx,ny:ny,len:len,angle:angle};
  }

  function placeOnEdge(edgeIdx,t,offset,yPos,w,h,mat,castS){
    var e=edgeInfo(edgeIdx);
    var px=e.ax+t*e.len*e.ux+offset*e.nx;
    var pz=e.ay+t*e.len*e.uy+offset*e.ny;
    var m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
    m.position.set(px,yPos,-pz);
    m.rotation.y=-e.angle;
    if(castS)m.castShadow=true;
    g.add(m);
    return m;
  }

  if(isRect){
    // ============ RECTANGULAR PATH (unchanged OBB approach) ============
    var bW=W*0.92, bD=D*0.92;
    addBox(bW,F1,bD, 0,F1/2,0, matConcrete);
    addBox(bW+0.3,SLAB,bD+0.3, 0,F1+SLAB/2,0, matConcreteSlab);
    addBox(bW,F2,bD, 0,f2base+F2/2,0, matConcrete);
    addBox(bW+0.3,SLAB,bD+0.3, 0,roofY-SLAB/2,0, matConcreteSlab);

    // Wood cladding
    addBox(bW*0.3,F1*0.7,0.1, -bW*0.15,F1*0.4,bD/2+0.05, matWood);
    addBox(bW*0.12,F1*0.5,0.1, bW*0.32,F1*0.3,bD/2+0.05, matWood);
    addBox(0.1,F2*0.6,bD*0.4, bW/2+0.05,f2base+F2*0.35,0, matWood);
    addBox(0.1,F1*0.55,bD*0.3, -bW/2-0.05,F1*0.33,-bD*0.1, matWood);

    // Accent box on roof corner
    var accW=bW*0.14,accH=Math.min(1.8,F2*0.55),accD=bD*0.25;
    addBox(accW,accH,accD, bW/2-accW/2-0.15,roofY+accH/2,bD/2-accD/2-0.15, matWood);

    // Glass
    var g1H=F1*0.78,g2H=F2*0.92;
    addBox(bW*0.4,g1H,0.06, bW*0.08,F1*0.43,bD/2+glassInset, matGlassLit);
    addBox(0.06,g1H,bD*0.35, -bW/2-glassInset,F1*0.43,bD*0.1, matGlass);
    addBox(0.06,F1*0.5,bD*0.25, bW/2+glassInset,F1*0.3,bD*0.05, matGlass);
    // Floor 1 mullions
    for(var mi=-1;mi<=1;mi++) addBox(0.05,g1H,0.03, bW*0.08+mi*bW*0.1,F1*0.43,bD/2+glassInset+0.02, matFrame,false,false);
    addBox(bW*0.4,0.05,0.03, bW*0.08,F1*0.55,bD/2+glassInset+0.02, matFrame,false,false);
    // Floor 2 glass
    var balcGlassW=bW*0.4;
    addBox(balcGlassW,g2H,0.06, bW*0.05,f2base+g2H/2+0.05,bD/2+glassInset, matGlassLit);
    addBox(bW*0.28,F2*0.7,0.06, -bW*0.25,f2base+F2*0.4,bD/2+glassInset, matGlassLit);
    for(mi=-1;mi<=1;mi++) addBox(0.04,g2H,0.03, bW*0.05+mi*balcGlassW*0.25,f2base+g2H/2+0.05,bD/2+glassInset+0.02, matFrame,false,false);
    addBox(0.06,g2H,bD*0.45, bW/2+glassInset,f2base+F2*0.45,0, matGlass);
    addBox(0.06,g2H,bD*0.45, -bW/2-glassInset,f2base+F2*0.45,0, matGlass);
    // Back wall — floor 1 glass + mullions
    addBox(bW*0.4,g1H*0.85,0.06, 0,F1*0.45,-bD/2-glassInset, matGlass);
    for(mi=-1;mi<=1;mi++) addBox(0.05,g1H*0.85,0.03, mi*bW*0.1,F1*0.45,-bD/2-glassInset-0.02, matFrame,false,false);
    addBox(bW*0.4,0.05,0.03, 0,F1*0.58,-bD/2-glassInset-0.02, matFrame,false,false);
    // Back wall — floor 2 glass + mullions
    addBox(bW*0.45,g2H*0.8,0.06, -bW*0.05,f2base+F2*0.43,-bD/2-glassInset, matGlass);
    for(mi=-1;mi<=1;mi++) addBox(0.05,g2H*0.8,0.03, -bW*0.05+mi*bW*0.12,f2base+F2*0.43,-bD/2-glassInset-0.02, matFrame,false,false);
    // Back wall — wood cladding panel
    addBox(bW*0.2,F1*0.6,0.1, bW*0.3,F1*0.35,-bD/2-0.05, matWood);
    addBox(bW*0.15,F2*0.5,0.1, bW*0.35,f2base+F2*0.3,-bD/2-0.05, matWood);

    // Balcony
    var balcW=balcGlassW+0.3,balcDepth=0.35,balcSlabH=0.12;
    addBox(balcW,balcSlabH,balcDepth, bW*0.05,f2base-balcSlabH/2,bD/2+balcDepth/2, matConcreteSlab);
    var balcRailH=1.0;
    for(var bi=0;bi<=5;bi++) addBox(railTh,balcRailH,railTh, bW*0.05+(bi/5-0.5)*balcW,f2base+balcRailH/2,bD/2+balcDepth, matRailing,false,false);
    addBox(balcW,railTh,railTh, bW*0.05,f2base+balcRailH,bD/2+balcDepth, matRailing,false,false);
    addBox(balcW,railTh,railTh, bW*0.05,f2base+balcRailH*0.5,bD/2+balcDepth, matRailing,false,false);
    for(var bs=-1;bs<=1;bs+=2) addBox(railTh,balcRailH,balcDepth, bW*0.05+bs*balcW/2,f2base+balcRailH/2,bD/2+balcDepth/2, matRailing,false,false);

    // Door
    var doorH=Math.min(2.4,F1*0.75);
    addBox(1.2,doorH,0.1, -bW*0.15,doorH/2,bD/2+glassInset+0.01, matDoor);
    addBox(1.35,0.08,0.12, -bW*0.15,doorH+0.04,bD/2+glassInset, matFrame,false,false);
    addBox(0.06,doorH,0.12, -bW*0.15-0.63,doorH/2,bD/2+glassInset, matFrame,false,false);
    addBox(0.06,doorH,0.12, -bW*0.15+0.63,doorH/2,bD/2+glassInset, matFrame,false,false);

    // Rooftop railings
    for(var ri=0;ri<=8;ri++){
      var rx=(ri/8-0.5)*bW;
      addBox(railTh,railH,railTh, rx,roofY+railH/2,bD/2, matRailing,false,false);
      addBox(railTh,railH,railTh, rx,roofY+railH/2,-bD/2, matRailing,false,false);
    }
    for(ri=0;ri<=4;ri++){
      var rz=(ri/4-0.5)*bD;
      addBox(railTh,railH,railTh, bW/2,roofY+railH/2,rz, matRailing,false,false);
      addBox(railTh,railH,railTh, -bW/2,roofY+railH/2,rz, matRailing,false,false);
    }
    addBox(bW,railTh,railTh, 0,roofY+railH,bD/2, matRailing,false,false);
    addBox(bW,railTh,railTh, 0,roofY+railH,-bD/2, matRailing,false,false);
    addBox(railTh,railTh,bD, bW/2,roofY+railH,0, matRailing,false,false);
    addBox(railTh,railTh,bD, -bW/2,roofY+railH,0, matRailing,false,false);

    // Pergola
    var pergX2=-bW*0.1,pergW2=bW*0.35,pergDp2=bD*0.5,pergH2=2.2;
    [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(function(pr){
      addBox(0.14,pergH2,0.14, pergX2+pr[0]*(pergW2/2-0.1),roofY+pergH2/2,pr[1]*(pergDp2/2-0.1), matWoodDark,false,false);
    });
    for(var sl=0;sl<7;sl++) addBox(pergW2+0.1,0.08,0.06, pergX2,roofY+pergH2,(sl/6-0.5)*pergDp2, matWoodDark,false,false);
    addBox(0.1,0.12,pergDp2+0.1, pergX2-pergW2*0.42,roofY+pergH2-0.06,0, matWoodDark,false,false);
    addBox(0.1,0.12,pergDp2+0.1, pergX2+pergW2*0.42,roofY+pergH2-0.06,0, matWoodDark,false,false);

  }else{
    // ============ POLYGON PATH ============
    extrudePoly(0,F1,matConcrete);
    polySlab(F1,SLAB,matConcreteSlab);       // slab between floor 1 and 2
    extrudePoly(f2base,F2,matConcrete);
    polySlab(f2base+F2,SLAB,matConcreteSlab); // roof slab

    // --- Compute edge info ---
    var edges=[];
    var longIdx=0,longLen=0;
    for(var ei=0;ei<n;ei++){
      var ea=poly2D[ei],eb=poly2D[(ei+1)%n];
      var edx2=eb[0]-ea[0],edy2=eb[1]-ea[1],eLen2=Math.hypot(edx2,edy2);
      var eAngle=Math.atan2(edy2,edx2);
      // outward normal: need to check winding. Use centroid to determine outward direction.
      var nx2=-edy2/eLen2, ny2=edx2/eLen2;
      var emx2=(ea[0]+eb[0])/2, emy2=(ea[1]+eb[1])/2;
      // If normal points toward centroid, flip it
      if((emx2+nx2-cent[0])*(emx2+nx2-cent[0])+(emy2+ny2-cent[1])*(emy2+ny2-cent[1]) <
         (emx2-nx2-cent[0])*(emx2-nx2-cent[0])+(emy2-ny2-cent[1])*(emy2-ny2-cent[1])){
        nx2=-nx2; ny2=-ny2;
      }
      edges.push({ax:ea[0],ay:ea[1],bx:eb[0],by:eb[1],dx:edx2,dy:edy2,len:eLen2,angle:eAngle,
        ux:edx2/eLen2,uy:edy2/eLen2,nx:nx2,ny:ny2});
      if(eLen2>longLen){longLen=eLen2;longIdx=ei}
    }

    // === FACADE — modern style: large glass, wood cladding, mullions, balcony ===
    var sorted=edges.map(function(e2,i2){return{idx:i2,len:e2.len}}).sort(function(a,b){return b.len-a.len});

    for(ei=0;ei<n;ei++){
      var e=edges[ei];
      if(e.len<2)continue;
      var faceAngle=Math.atan2(e.nx,-e.ny);
      var isFront=(ei===longIdx);
      var isShort=(e.len<sorted[Math.min(2,n-1)].len); // shorter edges get wood cladding

      // --- Large glass wall on each edge ---
      var glassW=e.len*0.55;
      var g1H=F1*0.75, g2H=F2*0.8;
      var gMat=isFront?matGlassLit:matGlass;
      var gOff=0.06; // offset from wall

      // Floor 1 glass
      var gcx=e.ax+0.5*e.dx+e.nx*gOff;
      var gcz=e.ay+0.5*e.dy+e.ny*gOff;
      var gm1=new THREE.Mesh(new THREE.PlaneGeometry(glassW,g1H),gMat);
      gm1.position.set(gcx,F1*0.43,-gcz);
      gm1.rotation.y=faceAngle;
      g.add(gm1);

      // Floor 2 glass
      var gm2=new THREE.Mesh(new THREE.PlaneGeometry(glassW,g2H),gMat);
      gm2.position.set(gcx,f2base+F2*0.45,-gcz);
      gm2.rotation.y=faceAngle;
      g.add(gm2);

      // --- Mullion frames (vertical dividers) ---
      var mullionCount=Math.max(2,Math.round(glassW/2));
      for(var mi=0;mi<mullionCount;mi++){
        var mt=(mi+1)/(mullionCount+1);
        var mmx=e.ax+(0.5-glassW/e.len*0.5+mt*glassW/e.len)*e.dx+e.nx*(gOff+0.01);
        var mmz=e.ay+(0.5-glassW/e.len*0.5+mt*glassW/e.len)*e.dy+e.ny*(gOff+0.01);
        // Floor 1 mullion
        var mv1=new THREE.Mesh(new THREE.PlaneGeometry(0.05,g1H),matFrame);
        mv1.position.set(mmx,F1*0.43,-mmz);
        mv1.rotation.y=faceAngle;
        g.add(mv1);
        // Floor 2 mullion
        var mv2=new THREE.Mesh(new THREE.PlaneGeometry(0.05,g2H),matFrame);
        mv2.position.set(mmx,f2base+F2*0.45,-mmz);
        mv2.rotation.y=faceAngle;
        g.add(mv2);
      }

      // --- Horizontal mullion ---
      var hmx=e.ax+0.5*e.dx+e.nx*(gOff+0.01);
      var hmz=e.ay+0.5*e.dy+e.ny*(gOff+0.01);
      var hm1=new THREE.Mesh(new THREE.PlaneGeometry(glassW,0.05),matFrame);
      hm1.position.set(hmx,F1*0.6,-hmz);
      hm1.rotation.y=faceAngle;
      g.add(hm1);

      // --- Wood cladding on shorter edges ---
      if(isShort){
        var clW=e.len*0.35, clH=F1*0.6;
        var clx=e.ax+0.15*e.dx+e.nx*0.05;
        var clz=e.ay+0.15*e.dy+e.ny*0.05;
        var cl1=new THREE.Mesh(new THREE.PlaneGeometry(clW,clH),matWood);
        cl1.position.set(clx,F1*0.35,-clz);
        cl1.rotation.y=faceAngle;
        g.add(cl1);
        // Floor 2 wood cladding
        var cl2=new THREE.Mesh(new THREE.PlaneGeometry(clW,F2*0.5),matWood);
        cl2.position.set(clx,f2base+F2*0.3,-clz);
        cl2.rotation.y=faceAngle;
        g.add(cl2);
      }

      // --- Front edge: balcony with full-height glass door ---
      if(isFront){
        // Full-height glass door section (behind balcony)
        var doorGlassW=e.len*0.3;
        var doorGlassH=F2*0.9;
        var dgx=e.ax+0.6*e.dx+e.nx*(gOff+0.01);
        var dgz=e.ay+0.6*e.dy+e.ny*(gOff+0.01);
        var dg=new THREE.Mesh(new THREE.PlaneGeometry(doorGlassW,doorGlassH),matGlassLit);
        dg.position.set(dgx,f2base+doorGlassH/2+0.05,-dgz);
        dg.rotation.y=faceAngle;
        g.add(dg);
        // Sliding door mullions
        for(var di=-1;di<=1;di++){
          var dmx=e.ax+(0.6+di*doorGlassW*0.3/e.len)*e.dx+e.nx*(gOff+0.02);
          var dmz=e.ay+(0.6+di*doorGlassW*0.3/e.len)*e.dy+e.ny*(gOff+0.02);
          var dm=new THREE.Mesh(new THREE.PlaneGeometry(0.04,doorGlassH),matFrame);
          dm.position.set(dmx,f2base+doorGlassH/2+0.05,-dmz);
          dm.rotation.y=faceAngle;
          g.add(dm);
        }

        // One-step balcony slab
        var balcW2=doorGlassW+0.3, balcD2=0.35;
        var balcCx=e.ax+0.6*e.dx+balcD2*0.5*e.nx;
        var balcCz=e.ay+0.6*e.dy+balcD2*0.5*e.ny;
        var bSlab=new THREE.Mesh(new THREE.BoxGeometry(balcW2,0.12,balcD2),matConcreteSlab);
        bSlab.position.set(balcCx,f2base-0.06,-balcCz);
        bSlab.rotation.y=e.angle;
        g.add(bSlab);
        // Balcony railing
        var bRailH=1.0;
        var bFx=e.ax+0.6*e.dx+balcD2*e.nx;
        var bFz=e.ay+0.6*e.dy+balcD2*e.ny;
        for(var bri=0;bri<=4;bri++){
          var bt2=(bri/4-0.5)*balcW2;
          var bpx=bFx+bt2*e.ux, bpz=bFz+bt2*e.uy;
          var bp=new THREE.Mesh(new THREE.BoxGeometry(railTh,bRailH,railTh),matRailing);
          bp.position.set(bpx,f2base+bRailH/2,-bpz);
          g.add(bp);
        }
        var bTopR=new THREE.Mesh(new THREE.BoxGeometry(balcW2,railTh,railTh),matRailing);
        bTopR.position.set(bFx,f2base+bRailH,-bFz);
        bTopR.rotation.y=e.angle;
        g.add(bTopR);
        var bMidR=new THREE.Mesh(new THREE.BoxGeometry(balcW2,railTh,railTh),matRailing);
        bMidR.position.set(bFx,f2base+bRailH*0.5,-bFz);
        bMidR.rotation.y=e.angle;
        g.add(bMidR);

        // Front door with wood cladding surround
        var doorH2=Math.min(2.4,F1*0.75);
        var doorX=e.ax+0.2*e.dx+e.nx*0.06;
        var doorZ=e.ay+0.2*e.dy+e.ny*0.06;
        var doorMesh=new THREE.Mesh(new THREE.PlaneGeometry(1.2,doorH2),matDoor);
        doorMesh.position.set(doorX,doorH2/2,-doorZ);
        doorMesh.rotation.y=faceAngle;
        g.add(doorMesh);
        // Door frame
        var dfx=e.ax+0.2*e.dx+e.nx*0.055;
        var dfz=e.ay+0.2*e.dy+e.ny*0.055;
        var df1=new THREE.Mesh(new THREE.PlaneGeometry(1.35,0.08),matFrame);
        df1.position.set(dfx,doorH2+0.04,-dfz);
        df1.rotation.y=faceAngle;
        g.add(df1);
      }
    }

    // === ROOFTOP RAILINGS ===
    for(ei=0;ei<n;ei++){
      var re=edges[ei];
      if(re.len<0.5)continue;
      var postCount=Math.max(2,Math.round(re.len/1.5));
      for(var pi=0;pi<=postCount;pi++){
        var pt=pi/postCount;
        var rpx=re.ax+pt*re.dx, rpz=re.ay+pt*re.dy;
        var rpost=new THREE.Mesh(new THREE.BoxGeometry(railTh,railH,railTh),matRailing);
        rpost.position.set(rpx, roofY+railH/2, -rpz);
        g.add(rpost);
      }
      var rmx=(re.ax+re.bx)/2, rmy=(re.ay+re.by)/2;
      var tR=new THREE.Mesh(new THREE.BoxGeometry(re.len,railTh,railTh),matRailing);
      tR.position.set(rmx, roofY+railH, -rmy);
      tR.rotation.y=re.angle;
      g.add(tR);
      var mR=new THREE.Mesh(new THREE.BoxGeometry(re.len,railTh,railTh),matRailing);
      mR.position.set(rmx, roofY+railH*0.5, -rmy);
      mR.rotation.y=re.angle;
      g.add(mR);
    }

    // === PERGOLA on rooftop ===
    var pergSz=Math.min(W,D)*0.35, pergH3=2.2;
    [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(function(pr){
      var ppx=cent[0]+pr[0]*(pergSz/2-0.1)*dirX+pr[1]*(pergSz/2-0.1)*perpX;
      var ppz=cent[1]+pr[0]*(pergSz/2-0.1)*dirY+pr[1]*(pergSz/2-0.1)*perpY;
      var pm=new THREE.Mesh(new THREE.BoxGeometry(0.14,pergH3,0.14),matWoodDark);
      pm.position.set(ppx,roofY+pergH3/2,-ppz);
      g.add(pm);
    });
    for(var psi=0;psi<7;psi++){
      var pst=(psi/6-0.5)*pergSz;
      var psx=cent[0]+pst*perpX, psz=cent[1]+pst*perpY;
      var psm=new THREE.Mesh(new THREE.BoxGeometry(pergSz+0.1,0.08,0.06),matWoodDark);
      psm.position.set(psx,roofY+pergH3,-psz);
      psm.rotation.y=Math.atan2(dirY,dirX);
      g.add(psm);
    }
    for(var pbi=-1;pbi<=1;pbi+=2){
      var pbx=cent[0]+pbi*(pergSz*0.42)*dirX, pbz=cent[1]+pbi*(pergSz*0.42)*dirY;
      var pb=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.12,pergSz+0.1),matWoodDark);
      pb.position.set(pbx,roofY+pergH3-0.06,-pbz);
      pb.rotation.y=Math.atan2(dirY,dirX);
      g.add(pb);
    }

    // === WOODEN ACCENT BOX on roof corner ===
    // Place near the vertex farthest from centroid
    var farIdx=0,farDist=0;
    for(var fi=0;fi<n;fi++){
      var fd=Math.hypot(poly2D[fi][0]-cent[0],poly2D[fi][1]-cent[1]);
      if(fd>farDist){farDist=fd;farIdx=fi}
    }
    // Offset slightly inward from that vertex toward centroid
    var fv=poly2D[farIdx];
    var toCx=cent[0]-fv[0], toCy=cent[1]-fv[1];
    var tcLen=Math.hypot(toCx,toCy);
    var accX=fv[0]+toCx/tcLen*1.5;
    var accZ=fv[1]+toCy/tcLen*1.5;
    var accW2=1.8, accH2=Math.min(1.8,F2*0.55), accD2=1.2;
    var accBox=new THREE.Mesh(new THREE.BoxGeometry(accW2,accH2,accD2),matWood);
    accBox.position.set(accX, roofY+accH2/2, -accZ);
    accBox.rotation.y=Math.atan2(dirY,dirX);
    accBox.castShadow=true;
    g.add(accBox);
  }

  return g;
}

// =============================================
// TEST: Three shapes side by side

// 1. RECTANGLE (12×8) — like lots A & B
const rectPoly=[[-6,-4],[6,-4],[6,4],[-6,4]];
const rectVilla=buildModernVilla(
  rectPoly.map(function(p){return[p[0]-12,p[1]]}),
  6.5, 0xD85A30

scene.add(rectVilla);

const irregPoly=[
  [3.80, -4.11],
  [2.39,  1.72],
  [0.18,  5.95],
  [-6.43, 3.03],
  [0.09, -6.62]
];

const irregVilla=buildModernVilla(
  irregPoly.map(function(p){return[p[0]+12,p[1]]}),
  6.5, 0x534AB7
);
scene.add(irregVilla);

// --- Labels (flat text planes) ---
function addLabel(text,x,z){
  const canvas=document.createElement('canvas');
  canvas.width=512;canvas.height=64;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#333';ctx.font='bold 32px sans-serif';
  ctx.textAlign='center';ctx.fillText(text,256,42);
  const tex=new THREE.CanvasTexture(canvas);
  const m=new THREE.Mesh(
    new THREE.PlaneGeometry(8,1),
    new THREE.MeshBasicMaterial({map:tex,transparent:true})
  );
  m.rotation.x=-Math.PI/2;
  m.position.set(x,0.05,-z);
  scene.add(m);
}
addLabel('Rectangle 12×8',-12,-8);
addLabel('Pentagon (Villa C, 68m²)',12,-8);

// --- Animate ---
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
